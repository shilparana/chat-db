version: '3.8'

services:
  postgres-ecommerce:
    image: postgres:15
    container_name: postgres-ecommerce
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass123
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts/postgres-ecommerce:/docker-entrypoint-initdb.d
      - postgres-ecommerce-data:/var/lib/postgresql/data
    networks:
      - db-network

